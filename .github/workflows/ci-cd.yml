name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - run: dotnet restore

      - run: dotnet build --no-restore

      - run: dotnet test tests/Revu.Tests.Unit/Revu.Tests.Unit.csproj --no-build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Publish
        run: dotnet publish Revu/Revu.csproj -c Release -o ./publish

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          scope: resourceGroup
          resource-group-name: rg-revu-prod
          template-file: infra/main.bicep
          parameters: >
            adoPat=${{ secrets.ADO_PAT }}
            adoOrg=${{ secrets.ADO_ORG }}
            aiOpenAiKey=${{ secrets.AI_OPENAI_KEY }}
            aiAnthropicKey=${{ secrets.AI_ANTHROPIC_KEY }}

      - name: Deploy function app
        uses: azure/functions-action@v2
        with:
          app-name: func-revu
          package: ./publish
