name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - run: dotnet restore

      - run: dotnet build --no-restore

      - run: dotnet test tests/Revu.Tests.Unit/Revu.Tests.Unit.csproj --no-build --collect:"XPlat Code Coverage"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: '**/coverage.cobertura.xml'
