name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Publish
        run: dotnet publish Revu/Revu.csproj -c Release -o ./publish

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          resource-group-name: rg-revu-prod
          template-file: infra/main.bicep
          parameters: '{"aiOpenAiKey": "${{ secrets.AI_OPENAI_KEY }}", "aiAnthropicKey": "${{ secrets.AI_ANTHROPIC_KEY }}"}'

      - name: Deploy function app
        uses: azure/functions-action@v1
        with:
          app-name: func-revu
          package: ./publish
