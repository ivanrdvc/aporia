version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      azure:
        patterns:
          - "Azure.*"
          - "Microsoft.Azure.*"
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
        exclude-patterns:
          - "Microsoft.Extensions.AI*"
      ai:
        patterns:
          - "Microsoft.Extensions.AI*"
      agents:
        patterns:
          - "Microsoft.Agents.*"
      opentelemetry:
        patterns:
          - "OpenTelemetry*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
