version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    groups:
      azure:
        patterns:
          - "Azure.*"
          - "Microsoft.Azure.*"
      ai:
        patterns:
          - "Microsoft.Extensions.AI*"
          - "Microsoft.Agents.*"
          - "Anthropic*"
      opentelemetry:
        patterns:
          - "OpenTelemetry*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
